<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Mission App</title>

    <link rel="stylesheet" href="./styles.css" />

    <!-- MANIFEST -->
    <link rel="manifest" href="./manifest.json">

    <meta name="theme-color" content="#00d4ff" />
    <meta name="application-name" content="Mission App" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mission App" />

    <link rel="icon" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
</head>

<body>

<!-- INSTALL BUTTON -->
<button id="installBtn" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px 16px;
    border: none;
    background: #00d4ff;
    color: black;
    font-weight: bold;
    border-radius: 10px;
    display: none;
    z-index: 9999;
">
Install App
</button>

<!-- SPLASH -->
<div id="splash-screen">
    <div class="splash-content">
        <h1>📘 Mission App</h1>
        <p>Loading...</p>
        <div class="loader"></div>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
    <h1>TIME</h1>

    <div class="section-buttons">
        <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
        <button onclick="loadSection('timetable')">Weekly Timetable</button>
        <button onclick="loadSection('dashboard')">Dashboard</button>
        <button onclick="loadSection('top-student')">Top Student Mode</button>
        <button onclick="loadSection('sunnah')">Sunnah Tracker</button>
    </div>

    <div id="grade-progress-bar"></div>
    <div id="main-content"></div>

    <div id="grade-nav">
        <button onclick="previousGrade()" id="prev-btn">Previous</button>
        <button onclick="nextGrade()" id="next-btn">Next</button>
    </div>
</div>

<!-- JS FILES -->
<script src="./Sunnah-tracker.js"></script>
<script src="./Study-tracker.js"></script>
<script src="./weekly-timetable.js"></script>
<script src="./dashboard.js"></script>
<script src="./top-student-mode.js"></script>
<script src="./main.js"></script>

<!-- PWA SCRIPT -->
<script>
let deferredPrompt = null;

/* =========================
   INSTALL PROMPT (FIXED)
========================= */
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    console.log("✅ Install available");

    const btn = document.getElementById("installBtn");
    if (btn) btn.style.display = "block";
});

/* =========================
   INSTALL CLICK (FIXED)
========================= */
document.addEventListener("click", async (e) => {
    if (e.target && e.target.id === "installBtn") {

        if (!deferredPrompt) {
            alert("Install not available yet. Use Chrome menu → Add to Home Screen.");
            return;
        }

        deferredPrompt.prompt();

        const choice = await deferredPrompt.userChoice;

        console.log("User choice:", choice.outcome);

        deferredPrompt = null;

        const btn = document.getElementById("installBtn");
        if (btn) btn.style.display = "none";
    }
});

/* =========================
   APP INSTALLED
========================= */
window.addEventListener('appinstalled', () => {
    console.log("✅ App installed");
    deferredPrompt = null;

    const btn = document.getElementById("installBtn");
    if (btn) btn.style.display = "none";
});

/* =========================
   SERVICE WORKER (IMPROVED)
========================= */
if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const reg = await navigator.serviceWorker.register('./service-worker.js', {
                updateViaCache: 'none'
            });

            console.log('SW registered:', reg.scope);

            await navigator.serviceWorker.ready;

            // force update (important for GitHub)
            reg.update();

        } catch (err) {
            console.error('SW ERROR:', err);
        }
    });
}

/* =========================
   SPLASH
========================= */
window.addEventListener('DOMContentLoaded', () => {
    const splash = document.getElementById('splash-screen');
    const app = document.getElementById('app');

    if (app) app.style.display = 'block';

    requestAnimationFrame(() => {
        setTimeout(() => {
            splash?.classList.add('hide');

            setTimeout(() => {
                splash?.remove();
            }, 120);
        }, 200);
    });
});
</script>

</body>
</html>
