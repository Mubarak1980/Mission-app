<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Mission App</title>

<link rel="stylesheet" href="./styles.css" />

<!-- PWA MANIFEST -->
<link rel="manifest" href="./manifest.json">

<!-- ICONS -->
<link rel="icon" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />

<meta name="theme-color" content="#0b0f14" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Mission App" />

</head>

<body>

<!-- INSTALL BUTTON -->
<button id="installBtn" class="install-btn">
    Install App
</button>

<!-- SPLASH -->
<div id="splash-screen">
    <div class="splash-content">
        <h1>📘 Mission App</h1>
        <p>Loading...</p>
        <div class="loader"></div>
    </div>
</div>

<!-- MAIN APP -->
<div id="app" hidden>
    <h1>TIME</h1>

    <div class="section-buttons">
        <button data-section="study">Study Tracker</button>
        <button data-section="timetable">Weekly Timetable</button>
        <button data-section="dashboard">Dashboard</button>
        <button data-section="top-student">Top Student Mode</button>
        <button data-section="sunnah">Sunnah Tracker</button>
    </div>

    <div id="grade-progress-bar"></div>
    <div id="main-content"></div>

    <div id="grade-nav">
        <button id="prev-btn">Previous</button>
        <button id="next-btn">Next</button>
    </div>
</div>

<!-- SCRIPTS (DEFERRED = FASTER LOAD) -->
<script src="./Sunnah-tracker.js" defer></script>
<script src="./Study-tracker.js" defer></script>
<script src="./weekly-timetable.js" defer></script>
<script src="./dashboard.js" defer></script>
<script src="./top-student-mode.js" defer></script>
<script src="./main.js" defer></script>

<script defer>
let deferredPrompt = null;

/* =========================
   INSTALL HANDLING
========================= */
window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const btn = document.getElementById("installBtn");
    if (btn) btn.style.display = "block";
});

document.getElementById("installBtn")?.addEventListener("click", async () => {
    if (!deferredPrompt) return alert("Install not ready yet.");

    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;

    console.log("Install:", outcome);
    deferredPrompt = null;

    document.getElementById("installBtn").style.display = "none";
});

window.addEventListener("appinstalled", () => {
    deferredPrompt = null;
    document.getElementById("installBtn").style.display = "none";
});

/* =========================
   SERVICE WORKER (SAFE + NO LOOP)
========================= */
if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
        try {
            const reg = await navigator.serviceWorker.register("./service-worker.js");
            console.log("SW registered:", reg.scope);
        } catch (err) {
            console.error("SW failed:", err);
        }
    });
}

/* =========================
   SPLASH SCREEN (SMOOTHER)
========================= */
window.addEventListener("load", () => {
    const splash = document.getElementById("splash-screen");
    const app = document.getElementById("app");

    app.hidden = false;

    setTimeout(() => {
        splash?.classList.add("hide");
        setTimeout(() => splash?.remove(), 200);
    }, 400);
});

/* =========================
   EVENT HANDLING (NO INLINE JS)
========================= */
document.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-section]");
    if (btn) {
        const section = btn.dataset.section;
        window.loadSection?.(section, window.currentGrade);
    }
});

document.getElementById("prev-btn")?.addEventListener("click", () => {
    window.previousGrade?.();
});

document.getElementById("next-btn")?.addEventListener("click", () => {
    window.nextGrade?.();
});
</script>

</body>
</html>
