<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Mission App</title>

    <link rel="stylesheet" href="./styles.css" />

    <!-- MANIFEST -->
    <link rel="manifest" href="./manifest.json">

    <meta name="theme-color" content="#0b0f14" />
    <meta name="application-name" content="Mission App" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mission App" />

    <link rel="icon" href="./icon-192.png">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <!-- IMPORTANT FIX: helps Chrome detect scope properly -->
    <meta name="scope" content="./">
</head>

<body>

<button id="installBtn" style="
position: fixed;
bottom: 20px;
right: 20px;
padding: 12px 16px;
border: none;
background: #00d4ff;
color: black;
font-weight: bold;
border-radius: 10px;
display: none;
z-index: 9999;">
Install App
</button>

<div id="splash-screen">
    <div class="splash-content">
        <h1>📘 Mission App</h1>
        <p>Loading...</p>
        <div class="loader"></div>
    </div>
</div>

<div id="app" style="display:none;">
    <h1>TIME</h1>

    <div class="section-buttons">
        <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
        <button onclick="loadSection('timetable')">Weekly Timetable</button>
        <button onclick="loadSection('dashboard')">Dashboard</button>
        <button onclick="loadSection('top-student')">Top Student Mode</button>
        <button onclick="loadSection('sunnah')">Sunnah Tracker</button>
    </div>

    <div id="grade-progress-bar"></div>
    <div id="main-content"></div>

    <div id="grade-nav">
        <button onclick="previousGrade()" id="prev-btn">Previous</button>
        <button onclick="nextGrade()" id="next-btn">Next</button>
    </div>
</div>

<script src="./Sunnah-tracker.js"></script>
<script src="./Study-tracker.js"></script>
<script src="./weekly-timetable.js"></script>
<script src="./dashboard.js"></script>
<script src="./top-student-mode.js"></script>
<script src="./main.js"></script>

<script>
(() => {
  let deferredPrompt = null;
  const installBtn = document.getElementById("installBtn");

  if (!installBtn) return;

  // IMPORTANT FIX: debug visibility (helps detect Chrome blocking)
  window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      installBtn.style.display = "none";
      console.log("PWA INSTALLED");
  });

  // Install prompt
  window.addEventListener('beforeinstallprompt', (e) => {
      console.log("beforeinstallprompt FIRED"); // DEBUG

      e.preventDefault();
      deferredPrompt = e;

      installBtn.style.display = "block";
  });

  installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;

      deferredPrompt.prompt();

      const choice = await deferredPrompt.userChoice;

      console.log("Install result:", choice.outcome);

      deferredPrompt = null;
  });

  // Service Worker
  if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
          try {
              const reg = await navigator.serviceWorker.register('./service-worker.js', {
                  scope: './',
                  updateViaCache: "none"
              });

              await navigator.serviceWorker.ready;

              reg.update();

              console.log("SW READY:", reg.scope);

          } catch (err) {
              console.error("SW ERROR:", err);
          }
      });
  }

  // Splash
  window.addEventListener('DOMContentLoaded', () => {
      const splash = document.getElementById('splash-screen');
      const app = document.getElementById('app');

      app.style.display = 'block';
      app.style.opacity = '0';

      requestAnimationFrame(() => {
          requestAnimationFrame(() => {
              app.style.opacity = '1';

              setTimeout(() => {
                  splash?.classList.add('hide');
                  setTimeout(() => splash?.remove(), 300);
              }, 150);
          });
      });
  });

})();
</script>

</body>
</html>
