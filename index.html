<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<title>Mission App</title>

<link rel="stylesheet" href="./styles.css" />
<link rel="manifest" href="./manifest.json">

<meta name="theme-color" content="#00d4ff" />

<link rel="icon" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />
</head>

<body>

<!-- INSTALL BUTTON -->
<button id="installBtn" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px 16px;
    border: none;
    background: #00d4ff;
    color: black;
    font-weight: bold;
    border-radius: 10px;
    display: none;
    z-index: 9999;
">
Install App
</button>

<!-- SPLASH -->
<div id="splash-screen">
    <div class="splash-content">
        <h1>📘 Mission App</h1>
        <p>Loading...</p>
        <div class="loader"></div>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
    <h1>TIME</h1>

    <div class="section-buttons">
        <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
        <button onclick="loadSection('timetable')">Weekly Timetable</button>
        <button onclick="loadSection('dashboard')">Dashboard</button>
        <button onclick="loadSection('top-student')">Top Student Mode</button>
        <button onclick="loadSection('sunnah')">Sunnah Tracker</button>
    </div>

    <div id="grade-progress-bar"></div>
    <div id="main-content"></div>

    <div id="grade-nav">
        <button onclick="previousGrade()" id="prev-btn">Previous</button>
        <button onclick="nextGrade()" id="next-btn">Next</button>
    </div>
</div>

<!-- JS FILES -->
<script src="./Sunnah-tracker.js"></script>
<script src="./Study-tracker.js"></script>
<script src="./weekly-timetable.js"></script>
<script src="./dashboard.js"></script>
<script src="./top-student-mode.js"></script>
<script src="./main.js"></script>

<!-- =========================
PWA INSTALL FIX (FULLY STABLE)
========================= -->
<script>
let deferredPrompt = null;
const installBtn = document.getElementById("installBtn");

/* STEP 1: Detect install eligibility */
window.addEventListener("beforeinstallprompt", (e) => {
    console.log("🔥 beforeinstallprompt fired");

    e.preventDefault();
    deferredPrompt = e;

    if (installBtn) installBtn.style.display = "block";
});

/* STEP 2: Install click */
installBtn?.addEventListener("click", async () => {
    if (!deferredPrompt) {
        alert("Install not available. Must use HTTPS + valid PWA.");
        return;
    }

    deferredPrompt.prompt();

    const choice = await deferredPrompt.userChoice;
    console.log("Install result:", choice.outcome);

    deferredPrompt = null;
    installBtn.style.display = "none";
});

/* STEP 3: Installed event */
window.addEventListener("appinstalled", () => {
    console.log("✅ App installed");
    deferredPrompt = null;
    installBtn.style.display = "none";
});

/* STEP 4: SERVICE WORKER (FIXED + RELIABLE) */
if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
        try {
            const reg = await navigator.serviceWorker.register("./service-worker.js", {
                scope: "./",
                updateViaCache: "none"
            });

            console.log("SW registered:", reg.scope);

            await navigator.serviceWorker.ready;

            reg.update();

            // force reload when new SW takes control
            navigator.serviceWorker.addEventListener("controllerchange", () => {
                console.log("SW updated → reloading");
                window.location.reload();
            });

        } catch (err) {
            console.error("SW ERROR:", err);
        }
    });
}

/* STEP 5: SPLASH SCREEN */
window.addEventListener("DOMContentLoaded", () => {
    const splash = document.getElementById("splash-screen");
    const app = document.getElementById("app");

    if (app) app.style.display = "block";

    requestAnimationFrame(() => {
        setTimeout(() => {
            splash?.classList.add("hide");
            setTimeout(() => splash?.remove(), 150);
        }, 250);
    });
});
</script>

</body>
</html>
