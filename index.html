<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<title>Mission App</title>

<link rel="stylesheet" href="./styles.css" />
<link rel="manifest" href="./manifest.json">

<link rel="icon" href="./icon-192.png" />
<link rel="apple-touch-icon" href="./icon-192.png" />

<meta name="theme-color" content="#0b0f14" />
</head>

<body>

<button id="installBtn" style="
position: fixed;
bottom: 20px;
right: 20px;
padding: 12px 16px;
border: none;
background: #00d4ff;
color: black;
font-weight: bold;
border-radius: 10px;
display: none;
z-index: 9999;
">
Install App
</button>

<!-- SPLASH -->
<div id="splash-screen">
    <div class="splash-content">
        <h1>📘 Mission App</h1>
        <p>Loading...</p>
        <div class="loader"></div>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
    <h1>TIME</h1>

    <div class="section-buttons">
        <button onclick="loadSection('study', getCurrentGradeSafe())">Study Tracker</button>
        <button onclick="loadSection('timetable')">Weekly Timetable</button>
        <button onclick="loadSection('dashboard')">Dashboard</button>
        <button onclick="loadSection('top-student')">Top Student Mode</button>
        <button onclick="loadSection('sunnah')">Sunnah Tracker</button>
    </div>

    <div id="grade-progress-bar"></div>
    <div id="main-content"></div>

    <div id="grade-nav">
        <button onclick="previousGrade()" id="prev-btn">Previous</button>
        <button onclick="nextGrade()" id="next-btn">Next</button>
    </div>
</div>

<!-- ========================= -->
<!-- SCRIPTS (CORRECT ORDER) -->
<!-- ========================= -->

<!-- ✅ DATA FIRST -->
<script src="./data.js"></script>

<!-- ✅ MODULES -->
<script src="./Study-tracker.js"></script>
<script src="./weekly-timetable.js"></script>
<script src="./dashboard.js"></script>
<script src="./top-student-mode.js"></script>
<script src="./Sunnah-tracker.js"></script>

<!-- ✅ MAIN LAST -->
<script src="./main.js"></script>

<script>
let deferredPrompt = null;

/* SAFE GRADE */
function getCurrentGradeSafe() {
    return window.UI?.currentGrade || 9;
}

/* INSTALL */
window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const btn = document.getElementById("installBtn");
    if (btn) btn.style.display = "block";
});

/* BOOT */
window.addEventListener("DOMContentLoaded", () => {

    const installBtn = document.getElementById("installBtn");

    if (installBtn) {
        installBtn.addEventListener("click", async () => {
            if (!deferredPrompt) return;

            deferredPrompt.prompt();
            await deferredPrompt.userChoice;

            deferredPrompt = null;
            installBtn.style.display = "none";
        });
    }

    const splash = document.getElementById("splash-screen");
    const app = document.getElementById("app");

    setTimeout(() => {
        if (splash) {
            splash.classList.add("hide");

            setTimeout(() => {
                splash.remove();

                if (app) app.style.display = "block";

            }, 200);
        }
    }, 500);
});

/* SERVICE WORKER */
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
        .then(reg => reg.update())
        .catch(console.error);
    });

    navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
    });
}
</script>

</body>
</html>
