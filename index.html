<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Mission App</title>

    <link rel="stylesheet" href="./styles.css" />

    <!-- =========================
         PWA MANIFEST (FIXED SAFE)
    ========================== -->
    <link rel="manifest" href="./manifest.json">

    <!-- Theme (Chrome UI color) -->
    <meta name="theme-color" content="#0b0f14" />

    <meta name="application-name" content="Mission App" />

    <!-- PWA Mobile support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mission App" />

    <!-- ICON (ONLY ONE - CORRECT FOR CHROME) -->
    <link rel="icon" href="./icon-192.png">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <!-- OPTIONAL: Helps Chrome detect installability faster -->
    <meta name="format-detection" content="telephone=no" />
</head>

<body>

<!-- INSTALL BUTTON (UNCHANGED UI) -->
<button id="installBtn" style="
position: fixed;
bottom: 20px;
right: 20px;
padding: 12px 16px;
border: none;
background: #00d4ff;
color: black;
font-weight: bold;
border-radius: 10px;
display: none;
z-index: 9999;">
Install App
</button>

<!-- SPLASH -->
<div id="splash-screen">
    <div class="splash-content">
        <h1>📘 Mission App</h1>
        <p>Loading...</p>
        <div class="loader"></div>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
    <h1>TIME</h1>

    <div class="section-buttons">
        <button onclick="loadSection('study', currentGrade)">Study Tracker</button>
        <button onclick="loadSection('timetable')">Weekly Timetable</button>
        <button onclick="loadSection('dashboard')">Dashboard</button>
        <button onclick="loadSection('top-student')">Top Student Mode</button>
        <button onclick="loadSection('sunnah')">Sunnah Tracker</button>
    </div>

    <div id="grade-progress-bar"></div>
    <div id="main-content"></div>

    <div id="grade-nav">
        <button onclick="previousGrade()" id="prev-btn">Previous</button>
        <button onclick="nextGrade()" id="next-btn">Next</button>
    </div>
</div>

<!-- =========================
     JS FILES (UNCHANGED)
========================= -->
<script src="./Sunnah-tracker.js"></script>
<script src="./Study-tracker.js"></script>
<script src="./weekly-timetable.js"></script>
<script src="./dashboard.js"></script>
<script src="./top-student-mode.js"></script>
<script src="./main.js"></script>

<!-- =========================
     PWA CORE SYSTEM (FIXED ONLY)
========================= -->
<script>
(() => {
  let deferredPrompt = null;
  const installBtn = document.getElementById("installBtn");

  // Prevent crashes if DOM not ready
  if (!installBtn) return;

  // =========================
  // Install prompt trigger
  // =========================
  window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;

      installBtn.style.display = "block";
  });

  // =========================
  // Install click
  // =========================
  installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;

      deferredPrompt.prompt();

      const choice = await deferredPrompt.userChoice;

      if (choice && choice.outcome === "accepted") {
          installBtn.style.display = "none";
      }

      deferredPrompt = null;
  });

  // =========================
  // Installed event
  // =========================
  window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      installBtn.style.display = "none";
  });

  // =========================
  // Service Worker (FIXED CHROME SAFE)
  // =========================
  if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
          try {
              const reg = await navigator.serviceWorker.register('./service-worker.js', {
                  updateViaCache: "none"
              });

              // force update check (important for GitHub Pages)
              reg.update();

          } catch (err) {
              console.error("SW registration failed:", err);
          }
      });
  }

  // =========================
  // SPLASH SCREEN (UNCHANGED BEHAVIOR)
  // =========================
  window.addEventListener('DOMContentLoaded', () => {
      const splash = document.getElementById('splash-screen');
      const app = document.getElementById('app');

      app.style.display = 'block';
      app.style.opacity = '0';

      requestAnimationFrame(() => {
          requestAnimationFrame(() => {
              app.style.opacity = '1';

              setTimeout(() => {
                  splash?.classList.add('hide');
                  setTimeout(() => splash?.remove(), 300);
              }, 150);
          });
      });
  });

})();
</script>

</body>
    </html>
